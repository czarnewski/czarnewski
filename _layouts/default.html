<!doctype html>
<html>
<!-- <div style="background-color: #999999"></div> -->
<head>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="chrome=1">
  <title>Czarnewski</title>
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
<link rel="stylesheet" href="styles.css">
<meta name="viewport" content="width=device-width">

</head>
<body>
  <div style="background-color: #f2f2f2; height: 20px; position: fixed;"></div>
  <style> .wrapper{ width: 1100px; height: 800px} </style>
  <div class="wrapper">

      <div style="width: 240px; padding: 0px; float: left; height:100%;">
        <style> header{ width: 200px; padding: 60px 20px; text-align: right;} </style>
        <header>
          <br/>
          <a href="https://czarnewski.github.io/czarnewski/">
            <div class="zoom">
              <img style="border-radius: 50%;" src="/czarnewski/logos/profile_picture.jpg" width="200", height="200">
              <br/>
              <h1 style="text-align:center">Paulo Czarnewski</h1>
            </div>
          </a>
          <br/>
          <a href="/czarnewski/publications.html">
          <button class="button myHighlight" style="width:100%;">
            <img border="0" src="https://static.thenounproject.com/png/1143700-200.png" width="20" height="20" style="vertical-align:middle;">&nbsp;&nbsp;
            Publications
          </button></a>
          <a href="/czarnewski/teaching.html">
          <button class="button myHighlight" style="width:100%;">
            <img border="0" src="https://icon-library.com/images/teaching-icon-png/teaching-icon-png-20.jpg" width="20" height="20" style="vertical-align:middle;">&nbsp;&nbsp;
            Teaching
          </button></a>
          <a href="/czarnewski/career.html">
          <button class="button myHighlight" style="width:100%;">
            <img border="0" src="https://static.thenounproject.com/png/199301-200.png" width="20" height="20" style="vertical-align:middle;">&nbsp;&nbsp;
            Career
          </button></a>
          <a href="/czarnewski/employments.html">
          <button class="button myHighlight" style="width:100%;">
            <img border="0" src="https://i.pinimg.com/originals/b4/8d/d8/b48dd8ff9da1136d1caac40b2632fae9.png" width="20" height="20" style="vertical-align:middle;">&nbsp;&nbsp;
            Employments
          </button></a>
          <a href="/czarnewski/education.html">
          <button class="button myHighlight" style="width:100%;">
            <img border="0" src="https://icon-library.com/images/education-icon-free/education-icon-free-1.jpg" width="20" height="20" style="vertical-align:middle;">&nbsp;&nbsp;
            Education
          </button></a>
          <a href="/czarnewski/education.html">
          <button class="button myHighlight" style="width:100%;">
            <img border="0" src="https://icon-library.com/images/education-icon-free/education-icon-free-1.jpg" width="20" height="20" style="vertical-align:middle;">&nbsp;&nbsp;
            Education
          </button></a>

          <hr>
          {% if site.github.is_project_page %}
          <p class="view"><a href="{{ site.github.repository_url }}">View on GitHub&nbsp;&nbsp;<img border="0" src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="20" height="20">{{ github_name }}</a></p>
          {% endif %}
          <p><small>Theme: <a href="https://github.com/orderedlist">orderedlist</a></small></p>
        </header>
      </div>

      <div style="width: calc(100% - 240px); padding: 0px; float: left; height:100%;">
        <style> section{ width: auto; padding: 60px 30px; background-color: white} </style>
        <section>
          <div>
            {{ content }}
          </div>

        </section>
      </div>


  </div>
  <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  <footer>
    <!-- <div style="width:100%;background-color: #f2f2f2; height:20px;"></div> -->
  </footer>
</body>
</html>
